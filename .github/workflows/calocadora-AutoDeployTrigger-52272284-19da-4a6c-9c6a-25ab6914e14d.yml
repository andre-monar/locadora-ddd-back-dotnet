name: Trigger auto deployment for calocadora

on:
  push:
    branches: [ master ]
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CALOCADORA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CALOCADORA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CALOCADORA_AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          docker login acrlocadora.azurecr.io -u ${{ secrets.CALOCADORA_REGISTRY_USERNAME }} -p ${{ secrets.CALOCADORA_REGISTRY_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          docker build -t acrlocadora.azurecr.io/locadora-api:${{ github.sha }} -f LocadoraWebAPI/Dockerfile .
          docker push acrlocadora.azurecr.io/locadora-api:${{ github.sha }}
          docker tag acrlocadora.azurecr.io/locadora-api:${{ github.sha }} acrlocadora.azurecr.io/locadora-api:latest
          docker push acrlocadora.azurecr.io/locadora-api:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name calocadora \
            --resource-group rg-locadora \
            --image acrlocadora.azurecr.io/locadora-api:latest