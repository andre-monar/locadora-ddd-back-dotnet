name: Trigger auto deployment for calocadora

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/calocadora-AutoDeployTrigger-52272284-19da-4a6c-9c6a-25ab6914e14d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CALOCADORA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CALOCADORA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CALOCADORA_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}LocadoraWebAPI
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrlocadora.azurecr.io
          registryUsername: ${{ secrets.CALOCADORA_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CALOCADORA_REGISTRY_PASSWORD }}
          containerAppName: calocadora
          resourceGroup: rg-locadora
          imageToBuild: acrlocadora.azurecr.io/calocadora:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


